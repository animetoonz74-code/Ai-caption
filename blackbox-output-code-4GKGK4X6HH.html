<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Caption Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            text-align: center;
            padding: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 600px;
            gap: 0;
        }

        .upload-section, .preview-section {
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .upload-section {
            background: #f8f9fa;
            border-right: 1px solid #eee;
        }

        .file-upload {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .file-upload:hover {
            border-color: #ff6b6b;
            background: rgba(102, 126, 234, 0.1);
        }

        .file-upload.dragover {
            border-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
        }

        .file-icon {
            font-size: 4em;
            color: #667eea;
            margin-bottom: 20px;
        }

        .upload-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.3s ease;
            margin-top: 20px;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-group label {
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        select, input[type="range"] {
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 1em;
            background: white;
        }

        input[type="range"] {
            padding: 10px 0;
        }

        .style-preview {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .style-option {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .style-option.selected {
            border-color: #667eea;
            transform: scale(1.1);
        }

        .preview-section {
            position: relative;
            background: #000;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 400px;
            border-radius: 15px;
            overflow: hidden;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #previewVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .caption-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .no-video {
            color: white;
            font-size: 1.2em;
            text-align: center;
        }

        .download-btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2em;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s ease;
        }

        .download-btn:hover {
            transform: translateY(-2px);
        }

        .download-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .controls {
                grid-template-columns: 1fr;
            }
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 AI Video Caption Generator</h1>
            <p>Upload video aur automatically animated Hindi/English/Hinglish captions add karo!</p>
        </div>

        <div class="main-content">
            <div class="upload-section">
                <div class="file-upload" id="fileUpload">
                    <div class="file-icon">📹</div>
                    <h3>Video Upload Karo</h3>
                    <p>MP4, MOV, AVI (Max 100MB)</p>
                    <input type="file" id="videoInput" accept="video/*" style="display: none;">
                    <button class="upload-btn" onclick="document.getElementById('videoInput').click()">
                        Choose Video
                    </button>
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>AI captions generate ho rahe hain... Thoda wait karo! 🔥</p>
                </div>

                <div class="controls">
                    <div class="control-group">
                        <label>Language:</label>
                        <select id="languageSelect">
                            <option value="hindi">Hindi 🇮🇳</option>
                            <option value="english">English 🇺🇸</option>
                            <option value="hinglish">Hinglish 😎</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>Caption Style:</label>
                        <div class="style-preview">
                            <div class="style-option selected" data-style="classic" style="background: linear-gradient(45deg, #ff6b6b, #ee5a24);">Classic</div>
                            <div class="style-option" data-style="neon" style="background: #00f5ff;box-shadow: 0 0 20px #00f5ff;">Neon</div>
                            <div class="style-option" data-style="gradient" style="background: linear-gradient(45deg, #667eea, #764ba2);">Gradient</div>
                            <div class="style-option" data-style="bubble" style="background: #ff9ff3;border-radius: 50%;">Bubble</div>
                            <div class="style-option" data-style="fire" style="background: linear-gradient(45deg, #ff6b6b, #feca57);">Fire</div>
                            <div class="style-option" data-style="cyber" style="background: #0f3460;box-shadow: 0 0 20px #00d4ff;">Cyber</div>
                        </div>
                    </div>
                    <div class="control-group">
                        <label>Animation Speed:</label>
                        <input type="range" id="speedSlider" min="0.5" max="3" step="0.1" value="1">
                        <span id="speedValue">1.0x</span>
                    </div>
                </div>
            </div>

            <div class="preview-section">
                <div class="video-container" id="videoContainer">
                    <div class="no-video">Preview yahan dikhega 📱</div>
                </div>
                <button class="download-btn" id="downloadBtn" disabled>Download Video 🎥</button>
            </div>
        </div>
    </div>

    <video id="previewVideo" style="display: none;"></video>
    <canvas id="captionCanvas" class="caption-canvas" style="display: none;"></canvas>

    <script>
        class AICaptionGenerator {
            constructor() {
                this.video = document.getElementById('previewVideo');
                this.canvas = document.getElementById('captionCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.videoInput = document.getElementById('videoInput');
                this.languageSelect = document.getElementById('languageSelect');
                this.speedSlider = document.getElementById('speedSlider');
                this.downloadBtn = document.getElementById('downloadBtn');
                this.videoContainer = document.getElementById('videoContainer');
                this.loading = document.getElementById('loading');
                this.speedValue = document.getElementById('speedValue');
                
                this.captions = [];
                this.currentCaptionIndex = 0;
                this.animationStartTime = 0;
                this.isPlaying = false;
                this.currentStyle = 'classic';
                this.currentSpeed = 1.0;

                this.init();
            }

            init() {
                this.videoInput.addEventListener('change', (e) => this.handleVideoUpload(e));
                this.video.addEventListener('play', () => this.startCaptionAnimation());
                this.video.addEventListener('timeupdate', () => this.updateCaptions());
                this.video.addEventListener('pause', () => this.pauseCaptionAnimation());
                
                this.speedSlider.addEventListener('input', (e) => {
                    this.currentSpeed = parseFloat(e.target.value);
                    this.speedValue.textContent = this.currentSpeed + 'x';
                });

                document.getElementById('fileUpload').addEventListener('click', () => this.videoInput.click());
                document.getElementById('fileUpload').addEventListener('dragover', (e) => this.handleDragOver(e));
                document.getElementById('fileUpload').addEventListener('drop', (e) => this.handleDrop(e));
                document.getElementById('fileUpload').addEventListener('dragleave', (e) => this.handleDragLeave(e));

                // Style selection
                document.querySelectorAll('.style-option').forEach(option => {
                    option.addEventListener('click', (e) => this.selectStyle(e.target.dataset.style));
                });

                this.canvas.width = window.innerWidth / 2;
                this.canvas.height = 400;
            }

            handleDragOver(e) {
                e.preventDefault();
                document.getElementById('fileUpload').classList.add('dragover');
            }

            handleDragLeave(e) {
                e.preventDefault();
                document.getElementById('fileUpload').classList.remove('dragover');
            }

            handleDrop(e) {
                e.preventDefault();
                document.getElementById('fileUpload').classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    this.videoInput.files = files;
                    this.handleVideoUpload({ target: { files } });
                }
            }

            async handleVideoUpload(e) {
                const file = e.target.files[0];
                if (!file) return;

                if (file.size > 100 * 1024 * 1024) {
                    alert('Video size 100MB se zyada nahi ho sakta!');
                    return;
                }

                this.showLoading(true);
                const url = URL.createObjectURL(file);
                
                // Simulate AI speech recognition (demo ke liye predefined captions)
                await this.generateCaptions(file);
                
                this.video.src = url;
                this.videoContainer.innerHTML = '';
                this.videoContainer.appendChild(this.video);
                this.videoContainer.appendChild(this.canvas);
                this.canvas.style.display = 'block';
                
                this.video.load();
                this.showLoading(false);
                this.downloadBtn.disabled = false;
            }

            async generateCaptions(file) {
                // Demo captions - Real implementation mein Web Speech API ya server-side STT use karo
                const language = this.languageSelect.value;
                const demoCaptions = this.getDemoCaptions(language);
                
                this.captions = demoCaptions.map((text, index) => ({
                    text,
                    startTime: index * 3, // Har 3 second mein naya caption
                    duration: 5,
                    id: index
                }));

                return new Promise(resolve => setTimeout(resolve, 2000));
            }

            getDemoCaptions(language) {
                const hindi = [
                    "Namaste dosto!", 
                    "Aaj ka video bahut special hai",
                    "AI captions automatically generate ho rahe hain",
                    "Hindi mein baat kar rahe hain",
                    "Bahut mazedar content hai"
                ];
                
                const english = [
                    "Hello friends!", 
                    "Today's video is very special",
                    "AI captions are auto-generated",
                    "Speaking in English",
                    "Very interesting content"
                ];
                
                const hinglish = [
                    "Hello dosto!", 
                    "Aaj ka video bahut mast hai",
                    "AI captions auto generate ho rahe",
                    "Hinglish mein baat karte hain",
                    "Full on masti content"
                ];

                const captions = {
                    hindi, english, hinglish
                };

                return captions[language];
            }

            selectStyle(style) {
                this.currentStyle = style;
                document.querySelectorAll('.style-option').forEach(opt => opt.classList.remove('selected'));
                event.target.classList.add('selected');
            }

            startCaptionAnimation() {
                this.isPlaying = true;
                this.animationStartTime = performance.now();
                this.animate();
            }

            pauseCaptionAnimation() {
                this.isPlaying = false;
            }

            updateCaptions() {
                const currentTime = this.video.currentTime;
                this.currentCaptionIndex = this.captions.findIndex(caption => 
                    currentTime >= caption.startTime && currentTime < caption.startTime + caption.duration
                );
            }

            animate() {
                if (!this.isPlaying) return;

                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                const currentTime = this.video.currentTime;
                const caption = this.captions[this.currentCaptionIndex];
                
                if (caption && currentTime >= caption.startTime && currentTime < caption.startTime + caption.duration) {
                    this.drawAnimatedCaption(caption.text);
                }

                requestAnimationFrame(() => this.animate());
            }

            drawAnimatedCaption(text) {
                const centerX = this.canvas.width / 2;
                const centerY = this.canvas.height - 100;
                const fontSize = 48;
                
                this.ctx.save();
                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';
                
                // Style effects
                switch(this.currentStyle) {
                    case 'neon':
                        this.ctx.shadowColor = '#00f5ff';
                        this.ctx.shadowBlur = 20;
                        break;
                    case 'gradient':
                        const gradient = this.ctx.createLinearGradient(0, 0, this.canvas.width, 0);
                        gradient.addColorStop(0, '#667eea');
                        gradient.addColorStop(1, '#764ba2');
                        this.ctx.fillStyle = gradient;
                        break;
                    case 'bubble':
                        this.ctx.shadowColor = '#ff9ff3';
                        this.ctx.shadowBlur = 15;
                        break;
                    case 'fire':
                        this.ctx.shadowColor = '#ff6b6b';
                        this.ctx.shadowBlur = 25;
                        break;
                    case 'cyber':
                        this.ctx.shadowColor = '#00d4ff';
                        this.ctx.shadowBlur = 30;
                        break;
                    default:
                        this.ctx.shadowColor = 'rgba(0,0,0,0.5)';
                        this.ctx.shadowBlur = 10;
                }

                this.ctx.font = `bold ${fontSize}px 'Segoe UI', sans-serif`;
                this.ctx.fillStyle = this.currentStyle === 'gradient' ? null : 'white';
                
                // Pulse animation
                const time = performance.now() * this.currentSpeed * 0.001;
                const scale = 1 + Math.sin(time * 3) * 0.1;
                this.ctx.save();
                this.ctx.translate(centerX, centerY);
                this.ctx.scale(scale, scale);
                this.ctx.fillText(text, 0, 0);
                this.ctx.restore();

                this.ctx.restore();
            }

            async downloadVideo() {
                const stream = this.canvas.captureStream(30);
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];

                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                mediaRecorder
